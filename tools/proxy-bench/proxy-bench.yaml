---
apiVersion: batch/v1
kind: Job
metadata:
  name: proxy-bench
spec:
  backoffLimit: 0
  parallelism: 1
  completions: 1
  template:
    metadata:
      labels:
        app: dragonfly
        component: proxy-bench
    spec:
      restartPolicy: Never
      containers:
        - name: proxy-bench
          image: dragonflyoss/proxy-bench:v1.0.1
          imagePullPolicy: 'IfNotPresent'
          resources:
            requests:
              cpu: '8'
              memory: 16Gi
            limits:
              cpu: '8'
              memory: 16Gi
          # Mode: "repeat" downloads the same URL every request, "random"
          # appends a unique query string per request, "sequential" reads the
          # object head to tail in CHUNK_SIZE ranges, cycling through a fixed
          # pool of URL_COUNT unique query strings.
          args: ['repeat']
          env:
            - name: PROXY
              value: 'http://seed-client:4001'
            - name: RATE
              value: '100'
            - name: DURATION
              value: '60s'
            # Use 'http://file-server/large' (1GiB) for the sequential mode.
            # - name: TARGET_URL
            # value: 'http://file-server/small'
            # Byte range sent with every request, e.g. "0-1023". Empty means
            # full downloads.
            # - name: RANGE
            # value: ''
